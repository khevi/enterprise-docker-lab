services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: RootPass123
      MYSQL_DATABASE: devopsdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: AppPass123
    volumes:
      - /opt/devops/enterprise-app/mysql/data:/var/lib/mysql
      - /opt/devops/enterprise-app/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - enterprise-app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRootPass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  flask-app:
    build: ./app
    container_name: flask-app
    environment:
      DB_HOST: mysql-db
      DB_USER: appuser
      DB_PASSWORD: AppPass123
      DB_NAME: devopsdb
    ports:
      - "8081:5000"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - enterprise-app-net
    restart: unless-stopped

  app-nginx:
    image: nginx:latest
    container_name: app-nginx
    ports:
      - "8091:80"
    volumes:
      - /opt/devops/enterprise-app/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app
    networks:
      - enterprise-app-net
    restart: unless-stopped

networks:
  enterprise-app-net:
    external: true
